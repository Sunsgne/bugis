name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  backend:
    name: Backend (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Dependency audit (pip-audit)
        run: pip install pip-audit && pip-audit -r requirements.txt --ignore-vuln CVE-2026-44405
      - name: Alembic upgrade (sqlite)
        env:
          BUGIS_SKIP_SECURITY_CHECKS: "1"
          BUGIS_DATABASE_URL: sqlite:///./ci_alembic.db
        run: python -m app.migrate
      - name: Run tests
        env:
          BUGIS_SKIP_SECURITY_CHECKS: "1"
        run: python -m pytest -q

  frontend:
    name: Frontend (build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Dependency audit (npm)
        run: npm audit --audit-level=high
      - name: Build
        run: npm run build
