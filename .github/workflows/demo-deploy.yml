name: Deploy Demo

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check deploy credentials
        env:
          DEMO_SSH_PASSWORD: ${{ secrets.DEMO_SSH_PASSWORD }}
        run: |
          if [ -z "$DEMO_SSH_PASSWORD" ]; then
            echo "::warning::DEMO_SSH_PASSWORD secret not set — skip demo deploy"
            exit 0
          fi

      - name: Install sshpass
        if: ${{ secrets.DEMO_SSH_PASSWORD != '' }}
        run: sudo apt-get update && sudo apt-get install -y sshpass

      - name: Deploy to demo server
        if: ${{ secrets.DEMO_SSH_PASSWORD != '' }}
        env:
          DEMO_SSH_HOST: ${{ secrets.DEMO_SSH_HOST }}
          DEMO_SSH_PORT: ${{ secrets.DEMO_SSH_PORT }}
          DEMO_SSH_USER: ${{ secrets.DEMO_SSH_USER }}
          DEMO_SSH_PASSWORD: ${{ secrets.DEMO_SSH_PASSWORD }}
          DEMO_REMOTE_DIR: ${{ secrets.DEMO_REMOTE_DIR }}
        run: |
          export DEMO_SSH_HOST="${DEMO_SSH_HOST:-203.117.117.196}"
          export DEMO_SSH_PORT="${DEMO_SSH_PORT:-2333}"
          export DEMO_SSH_USER="${DEMO_SSH_USER:-root}"
          export DEMO_REMOTE_DIR="${DEMO_REMOTE_DIR:-/root/bugis}"
          chmod +x scripts/deploy-demo.sh
          ./scripts/deploy-demo.sh
