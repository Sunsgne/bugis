# Prometheus scrape config for HA (edit app node IPs).
global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: bugis-backend
    metrics_path: /metrics
    static_configs:
      - targets:
@TARGETS@
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
