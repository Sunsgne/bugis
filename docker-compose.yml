# Local / dev stack. Only frontend is published to the host; all other services
# communicate on the internal Docker network.
services:
  db:
    image: timescale/timescaledb:2.17.2-pg17
    command: ["postgres", "-c", "shared_preload_libraries=timescaledb"]
    environment:
      POSTGRES_USER: bugis
      POSTGRES_PASSWORD: bugis
      POSTGRES_DB: bugis
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bugis"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.4-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  backend:
    build: ./backend
    environment:
      BUGIS_DATABASE_URL: postgresql+psycopg://bugis:bugis@db:5432/bugis
      BUGIS_REDIS_URL: redis://redis:6379/0
      BUGIS_SECRET_KEY: please-change-this-secret-in-production
      BUGIS_DRY_RUN: "true"
      BUGIS_EXPOSE_OPENAPI: "false"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build: ./frontend
    depends_on:
      - backend
    ports:
      - "8080:80"

  prometheus:
    image: prom/prometheus:v3.12.0
    volumes:
      - ./deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./deploy/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
    depends_on:
      - backend

  grafana:
    image: grafana/grafana:13.0.2
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_DEFAULT_THEME: light
    volumes:
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus

volumes:
  pgdata:
